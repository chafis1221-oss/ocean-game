name: ocean_client
description: Ocean Command - 4v4 naval battle game
version: 0.6.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.15.0
  flame_audio: ^2.0.0
  flame_particles: ^1.0.0
  forge2d: ^0.14.0
  web_socket_channel: ^2.4.0
  http: ^1.1.0
  provider: ^6.0.5
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
